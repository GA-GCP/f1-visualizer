# ==========================================
# Pipeline: f1v-webapp (React Frontend)
# ==========================================
# Install, lint, test, build in Cloud Build, then
# Kaniko cached image build and Cloud Run deployment.
# ==========================================
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sa-f1v-cloudbuild-${_ENV}@$PROJECT_ID.iam.gserviceaccount.com'

substitutions:
  _ENV: 'dev'
  _SHORT_SHA: 'manual-build'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Install Dependencies
  #    canvas (node-canvas) is a native C++ addon used by visual-regression
  #    tests. Alpine needs Python, a C++ toolchain, and Cairo/Pango libs
  #    for node-gyp to compile it.
  - name: 'node:25-alpine'
    id: 'install'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache python3 make g++ pkgconf \
          cairo-dev pango-dev libjpeg-turbo-dev giflib-dev librsvg-dev \
        && yarn install --frozen-lockfile
    dir: 'frontend'

  # 2. ESLint Check
  - name: 'node:25-alpine'
    id: 'lint'
    entrypoint: 'yarn'
    args: ['lint']
    dir: 'frontend'

  # 3. Unit Tests
  #    canvas runtime libs needed for visual-regression tests (the compiled
  #    .node addon from step 1 links against cairo/pango shared libs).
  - name: 'node:25-alpine'
    id: 'test'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache cairo pango libjpeg-turbo giflib librsvg \
        && yarn test:ci
    dir: 'frontend'

  # 4. Production Build (produces dist/)
  - name: 'node:25-alpine'
    id: 'build'
    entrypoint: 'yarn'
    args: ['build', '--mode', '${_ENV}']
    dir: 'frontend'

  # 5. Kaniko Build + Push (with layer caching)
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-push-image'
    args:
      - '--dockerfile=/workspace/frontend/Dockerfile.ci'
      - '--context=/workspace/frontend'
      - '--destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:${_SHORT_SHA}'
      - '--destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:latest-${_ENV}'
      - '--cache=true'
      - '--cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend-cache'

  # 6. Deploy to Cloud Run (immutable SHA tag)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'f1v-webapp-${_ENV}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--project=$PROJECT_ID'
      - '--quiet'
