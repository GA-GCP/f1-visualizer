              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/analysis/drivers:
    get:
      summary: Get Drivers
      operationId: getDrivers
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
