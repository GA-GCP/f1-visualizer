# ==========================================
# Pipeline: f1v-service-telemetry
# ==========================================
# Scoped build + test, layer extraction, security scan,
# Kaniko cached image build, and Cloud Run deployment.
# ==========================================
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sa-f1v-cloudbuild-${_ENV}@$PROJECT_ID.iam.gserviceaccount.com'

substitutions:
  _ENV: 'dev'
  _SHORT_SHA: 'manual-build'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Scoped Maven Build + Test (only this module and its dependencies)
  - name: 'maven:3.9.12-eclipse-temurin-25'
    id: 'build-and-test'
    entrypoint: 'mvn'
    args:
      - 'clean'
      - 'package'
      - '-pl'
      - 'f1v-service-telemetry'
      - '-am'
    dir: 'backend'

  # 2. Extract Spring Boot JAR Layers
  - name: 'eclipse-temurin:25-jdk'
    id: 'extract-layers'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p /workspace/staging
        cd /workspace/staging
        java -Djarmode=layertools -jar /workspace/backend/f1v-service-telemetry/target/*.jar extract

  # 3. Trivy Filesystem Security Scan
  - name: 'aquasec/trivy:latest'
    id: 'security-scan'
    args:
      - 'filesystem'
      - '--exit-code'
      - '1'
      - '--severity'
      - 'CRITICAL,HIGH'
      - '--no-progress'
      - '/workspace/staging'

  # 4. Kaniko Build + Push (with layer caching)
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-push-image'
    args:
      - '--dockerfile=/workspace/backend/Dockerfile.ci'
      - '--context=/workspace/staging'
      - '--destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/telemetry:${_SHORT_SHA}'
      - '--destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/telemetry:latest'
      - '--cache=true'
      - '--cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/telemetry-cache'

  # 5. Deploy to Cloud Run (immutable SHA tag)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'f1v-service-telemetry-${_ENV}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/f1v-repo/telemetry:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--project=$PROJECT_ID'
      - '--quiet'
