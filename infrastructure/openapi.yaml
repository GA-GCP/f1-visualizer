              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/analysis/sessions/search:
    get:
      summary: Search Sessions
      operationId: searchSessions
      parameters:
        - name: query
          in: query
          required: false
          type: string
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: [ ]
    options:
      summary: CORS support
      operationId: searchSessionsOptions
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/analysis/drivers/{driverId}/stats:
    get:
      summary: Get Driver Stats
      operationId: getDriverStats
      parameters:
        - name: driverId
          in: path
          required: true
          type: integer
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: [ ]
    options:
      summary: CORS support
      operationId: driverStatsOptions
      parameters:
        - name: driverId
          in: path
          required: true
          type: integer
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  # --- INGESTION SERVICE ---
  /api/v1/ingestion/command:
    post:
      summary: Issue Command
      operationId: ingestionCommand
      x-google-backend:
        address: DATA_INGESTION_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: []
    options:
      summary: CORS support
      operationId: ingestionOptionsCommand
      x-google-backend:
        address: DATA_INGESTION_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/ingestion/load-historical:
    post:
      summary: Load Historical Data
      operationId: loadHistorical
      x-google-backend:
        address: DATA_INGESTION_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 120.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: []
    options:
      summary: CORS support
      operationId: ingestionOptionsLoad
      x-google-backend:
        address: DATA_INGESTION_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
