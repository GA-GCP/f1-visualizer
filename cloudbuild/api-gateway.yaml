serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sa-f1v-cloudbuild-${_ENV}@$PROJECT_ID.iam.gserviceaccount.com'

substitutions:
  _ENV: 'dev'
  _SHORT_SHA: 'manual-build'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Fetch Cloud Run URLs (Dynamic Discovery based on _ENV)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Dynamic Lookup using ${_ENV} suffix (Keep single $ for _ENV)
        TELEMETRY_URL=$(gcloud run services describe f1v-service-telemetry-${_ENV} --region=us-central1 --format='value(status.url)')
        DATA_ANALYSIS_URL=$(gcloud run services describe f1v-service-data-analysis-${_ENV} --region=us-central1 --format='value(status.url)')
        USER_URL=$(gcloud run services describe f1v-service-user-${_ENV} --region=us-central1 --format='value(status.url)')
        DATA_INGESTION_URL=$(gcloud run services describe f1v-service-data-ingestion-${_ENV} --region=us-central1 --format='value(status.url)')
        
        # --- NEW: Map Auth0 Tenants based on Environment ---
        if [ "${_ENV}" == "dev" ]; then
          # IMPORTANT: Do not include a trailing slash here, we handle it in the openapi.yaml
          AUTH0_ISSUER="https://yourname-portfolio-dev.us.auth0.com" 
          AUTH0_AUDIENCE="dev.api.f1visualizer.com"
        elif [ "${_ENV}" == "uat" ]; then
          AUTH0_ISSUER="https://yourname-portfolio-uat.us.auth0.com"
          AUTH0_AUDIENCE="uat.api.f1visualizer.com"
        elif [ "${_ENV}" == "prod" ]; then
          AUTH0_ISSUER="https://yourname-portfolio-prod.us.auth0.com"
          AUTH0_AUDIENCE="api.f1visualizer.com"
        else
          echo "Unknown environment: ${_ENV}"
          exit 1
        fi
        
        echo "Environment: ${_ENV}"
        echo "Configuring Gateway for Audience: $$AUTH0_AUDIENCE"
        
        # 2. Inject URLs into OpenAPI Spec
        sed -i "s|TELEMETRY_SERVICE_URL_PLACEHOLDER|$$TELEMETRY_URL|g" infrastructure/openapi.yaml
        sed -i "s|DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER|$$DATA_ANALYSIS_URL|g" infrastructure/openapi.yaml
        sed -i "s|USER_SERVICE_URL_PLACEHOLDER|$$USER_URL|g" infrastructure/openapi.yaml
        sed -i "s|DATA_INGESTION_SERVICE_URL_PLACEHOLDER|$$DATA_INGESTION_URL|g" infrastructure/openapi.yaml
        
        # 3. Inject Auth0 Identity values into OpenAPI Spec
        sed -i "s|AUTH0_ISSUER_URI_PLACEHOLDER|$$AUTH0_ISSUER|g" infrastructure/openapi.yaml
        sed -i "s|AUTH0_AUDIENCE_PLACEHOLDER|$$AUTH0_AUDIENCE|g" infrastructure/openapi.yaml
        
        # 4. Deploy API Gateway Config
        gcloud api-gateway api-configs create f1v-config-${_ENV}-${_SHORT_SHA} \
          --api=f1v-gateway-${_ENV} \
          --openapi-spec=infrastructure/openapi.yaml \
          --project=$PROJECT_ID --quiet

  # 4. Update Gateway to use new Config
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'api-gateway'
      - 'gateways'
      - 'update'
      - 'f1v-gateway-${_ENV}'
      - '--api=f1v-gateway-${_ENV}'
      - '--api-config=f1v-config-${_ENV}-${_SHORT_SHA}'
      - '--location=us-central1'
      - '--project=$PROJECT_ID'
      - '--quiet'