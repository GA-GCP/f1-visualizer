serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sa-f1v-cloudbuild-${_ENV}@$PROJECT_ID.iam.gserviceaccount.com'

substitutions:
  _ENV: 'dev'
  _SHORT_SHA: 'manual-build'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'node:25-alpine'
    entrypoint: 'yarn'
    args: ['install', '--frozen-lockfile']
    dir: 'frontend'

  - name: 'node:25-alpine'
    entrypoint: 'yarn'
    args: ['test:ci']
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'ENV_MODE=${_ENV}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:${_SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:latest'
      - '.'
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:${_SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/f1v-repo/frontend:latest'