swagger: '2.0'
info:
  title: F1 Visualizer API
  description: The central API Gateway routing traffic to F1V microservices.
  version: 1.0.0
host: "API_GATEWAY_HOST_PLACEHOLDER"
schemes:
  - https
produces:
  - application/json
consumes:
  - application/json
securityDefinitions:
  auth0_jwt:
    authorizationUrl: "AUTH0_ISSUER_URI_PLACEHOLDER/authorize"
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "AUTH0_ISSUER_URI_PLACEHOLDER/"
    x-google-jwks_uri: "AUTH0_ISSUER_URI_PLACEHOLDER/.well-known/jwks.json"
    x-google-audiences: "AUTH0_AUDIENCE_PLACEHOLDER"
    x-google-forward-auth-header: true
paths:
  # --- USER SERVICE ---
  /api/v1/users/me:
    get:
      summary: Get Current User
      operationId: getUser
      x-google-backend:
        address: USER_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: []
    options:
      summary: CORS support
      operationId: userOptionsMe
      x-google-backend:
        address: USER_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/users/me/preferences:
    put:
      summary: Update Preferences
      operationId: updateUserPrefs
      x-google-backend:
        address: USER_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: []
    options:
      summary: CORS support
      operationId: userOptionsPrefs
      x-google-backend:
        address: USER_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string

  # --- ANALYSIS SERVICE ---
  /api/v1/analysis/session/{sessionKey}/laps:
    get:
      summary: Get Laps
      operationId: getLaps
      parameters:
        - name: sessionKey
          in: path
          required: true
          type: string
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: []
    options:
      summary: CORS support
      operationId: analysisOptions
      parameters:
        - name: sessionKey
          in: path
          required: true
          type: string
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Allow-Credentials:
              type: string
  /api/v1/analysis/sessions:
    get:
      summary: Get Sessions
      operationId: getSessions
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
          description: OK
      security:
        - auth0_jwt: [ ]
    options:
      summary: CORS support
      operationId: sessionsOptions
      x-google-backend:
        address: DATA_ANALYSIS_SERVICE_URL_PLACEHOLDER
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 60.0
        disable_auth: true
      responses:
        '200':
